<html lang="de">

<meta charset="UTF-8">

<title>Lieferandi.de</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f5f5f5; max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:72px; }

.header { background:#ff8000; padding:14px 16px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.logo { color:#fff; font-size:21px; font-weight:900; }
.logo span { color:#ffe066; }
.cart-pill { background:#fff; color:#ff8000; border:none; border-radius:20px; padding:6px 14px; font-size:13px; font-weight:800; cursor:pointer; display:flex; align-items:center; gap:6px; }
.cart-pill .badge { background:#ff8000; color:#fff; border-radius:50%; width:19px; height:19px; font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:center; }
.addr-bar { background:#fff; border-radius:10px; padding:9px 13px; display:flex; align-items:center; gap:8px; font-size:13px; color:#333; margin-bottom:9px; }
.addr-bar .txt { flex:1; font-weight:600; }
.addr-bar .chg { color:#ff8000; font-weight:700; font-size:12px; cursor:pointer; }
.search-wrap { background:#fff; border-radius:10px; padding:9px 13px; display:flex; align-items:center; gap:8px; }
.search-wrap input { border:none; outline:none; flex:1; font-size:14px; }

.cuisine-row { background:#fff; padding:14px 16px 10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.cuisine-row h3 { font-size:16px; font-weight:800; margin-bottom:11px; color:#111; }
.cuisine-scroll { display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; }
.cuisine-scroll::-webkit-scrollbar { display:none; }
.cuisine-btn { display:flex; flex-direction:column; align-items:center; gap:5px; min-width:60px; cursor:pointer; flex-shrink:0; }
.cuisine-icon { width:54px; height:54px; border-radius:15px; background:#fff4e6; display:flex; align-items:center; justify-content:center; font-size:24px; border:2.5px solid transparent; transition:all .2s; }
.cuisine-icon.active { border-color:#ff8000; background:#ffe8cc; }
.cuisine-btn.locked { opacity:0.35; pointer-events:none; filter:grayscale(1); }
.cuisine-lbl { font-size:10px; font-weight:700; color:#666; text-align:center; }

.course-row { display:flex; gap:8px; padding:11px 16px; overflow-x:auto; scrollbar-width:none; background:#fafafa; border-bottom:1px solid #eee; }
.course-row::-webkit-scrollbar { display:none; }
.course-chip { padding:7px 16px; border-radius:20px; border:1.5px solid #ddd; background:#fff; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; color:#555; transition:all .2s; }
.course-chip.active { background:#ff8000; border-color:#ff8000; color:#fff; }

.dish-section { padding:14px 16px 6px; }
.dish-section h4 { font-size:15px; font-weight:800; color:#111; margin-bottom:10px; }
.dish-card { background:#fff; border-radius:14px; margin-bottom:10px; display:flex; align-items:flex-start; padding:13px; gap:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); }
.dish-img { width:72px; height:72px; border-radius:12px; object-fit:cover; flex-shrink:0; background:#f0f0f0; }
.dish-info { flex:1; }
.dish-name { font-size:14px; font-weight:800; color:#111; margin-bottom:3px; }
.dish-desc { font-size:12px; color:#999; line-height:1.4; margin-bottom:6px; }
.dish-price { font-size:15px; font-weight:800; color:#ff8000; }
.add-dish-btn { background:#ff8000; color:#fff; border:none; width:32px; height:32px; border-radius:50%; font-size:22px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; align-self:center; }
.add-dish-btn:hover { background:#e67000; }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:300; }
.cart-sheet { display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:#fff; border-radius:22px 22px 0 0; max-height:82vh; overflow-y:auto; z-index:301; }
.sheet-hdr { padding:16px; border-bottom:1px solid #f0f0f0; position:sticky; top:0; background:#fff; display:flex; align-items:center; gap:10px; }
.sheet-hdr h2 { font-size:18px; font-weight:800; flex:1; }
.sheet-close { background:#f5f5f5; border:none; width:32px; height:32px; border-radius:50%; font-size:17px; cursor:pointer; }
.ci { display:flex; align-items:center; padding:12px 16px; gap:11px; border-bottom:1px solid #f5f5f5; }
.ci-name { flex:1; font-size:14px; font-weight:600; }
.qty-ctrl { display:flex; align-items:center; gap:7px; }
.qb { background:#f5f5f5; border:none; width:28px; height:28px; border-radius:50%; font-size:16px; font-weight:700; cursor:pointer; }
.qn { font-weight:800; min-width:18px; text-align:center; }
.ci-price { font-size:14px; font-weight:700; color:#ff8000; min-width:52px; text-align:right; }
.cart-foot { padding:14px 16px; background:#f9f9f9; border-top:2px solid #eee; }
.tr { display:flex; justify-content:space-between; font-size:14px; color:#666; margin-bottom:5px; }
.tr.fin { font-size:17px; font-weight:800; color:#111; margin-top:8px; }
.order-btn { width:100%; padding:15px; background:#ff8000; color:#fff; border:none; border-radius:13px; font-size:16px; font-weight:800; cursor:pointer; margin-top:11px; }
.order-btn:hover { background:#e67000; }
.empty-cart { text-align:center; padding:40px 20px; color:#ccc; }
.empty-cart .ei { font-size:52px; margin-bottom:12px; }

.toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:#111; color:#fff; padding:11px 22px; border-radius:28px; font-size:13px; font-weight:600; z-index:999; opacity:0; transition:opacity .3s; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; }

.version-tag { text-align:center; font-size:10px; color:#bbb; padding:4px 0 2px; }
.bnav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:#fff; border-top:1px solid #eee; display:flex; z-index:200; }
.bni { flex:1; display:flex; flex-direction:column; align-items:center; padding:9px 0 12px; cursor:pointer; font-size:10px; font-weight:600; color:#bbb; gap:3px; }
.bni.active { color:#ff8000; }
.bni span:first-child { font-size:22px; }
</style>

<div class="header">
  <div class="header-top">
    <div class="logo">Lieferandi<span>.de</span></div>
    <div class="header-right">
      <button class="cart-pill" onclick="openCart()">🛒 Warenkorb <span class="badge" id="cartCount">0</span></button>
    </div>
  </div>
  <div class="addr-bar">
    <span>📍</span><span class="txt">Düsseldorf, Königsallee 1</span><span class="chg">Ändern</span>
  </div>
  <div class="search-wrap">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Gericht oder Küche suchen…" oninput="applyFilters()">
  </div>
</div>

<div class="cuisine-row">
  <h3>Was möchtest du essen?</h3>
  <div class="cuisine-scroll" id="cuisineScroll"></div>
</div>

<div class="course-row" id="courseRow"></div>

<div id="mainContent"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sheet" id="cartSheet">
  <div class="sheet-hdr">
    <span style="font-size:28px">🛒</span>
    <h2>Warenkorb</h2>
    <button class="sheet-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cartItems"></div>
  <div class="cart-foot" id="cartFoot"></div>
</div>

<div class="toast" id="toast"></div>

<div class="version-tag">v. 1.0</div>
<div class="bnav">
  <div class="bni active" onclick="scrollToTop()"><span>🏠</span>Start</div>
  <div class="bni" onclick="openCart()"><span>🛒</span>Warenkorb</div>
  <div class="bni"><span>❤️</span>Favoriten</div>
  <div class="bni"><span>👤</span>Profil</div>
</div>

let activeCuisine = 'alle';
let activeCourse  = 'hauptgerichte';
let cart = [];

// Safe name for use as data attribute
function safeName(name) {
  return encodeURIComponent(name);
}

function buildCuisineRow() {
  document.getElementById('cuisineScroll').innerHTML = cuisines.map(c => `
    <div class="cuisine-btn" id="cb-${c.id}" onclick="setCuisine('${c.id}')">
      <div class="cuisine-icon ${c.id === activeCuisine ? 'active' : ''}">${c.emoji}</div>
      <div class="cuisine-lbl">${c.label}</div>
    </div>
  `).join('');
}

function buildCourseRow() {
  document.getElementById('courseRow').innerHTML = courses.map(c => `
    <div class="course-chip ${c.id === activeCourse ? 'active' : ''}" id="cc-${c.id}" onclick="setCourse('${c.id}')">${c.label}</div>
  `).join('');
}

function setCuisine(id) {
  activeCuisine = id;
  // Update active state on cuisine buttons
  document.querySelectorAll('.cuisine-btn').forEach(btn => {
    btn.querySelector('.cuisine-icon').classList.remove('active');
  });
  const activeBtn = document.getElementById('cb-' + id);
  if (activeBtn) activeBtn.querySelector('.cuisine-icon').classList.add('active');
  renderDishes();
}

function setCourse(id) {
  activeCourse = id;
  document.querySelectorAll('.course-chip').forEach(el => el.classList.remove('active'));
  const chip = document.getElementById('cc-' + id);
  if (chip) chip.classList.add('active');
  renderDishes();
}

function getLockedCuisines() {
  // Returns set of cuisine IDs that ARE allowed based on cart contents
  if (cart.length === 0) return null; // null means no lock
  const allowed = new Set(['alle']);
  cart.forEach(item => {
    const dish = allDishes.find(d => d.name === item.name);
    if (dish) dish.cuisine.forEach(c => allowed.add(c));
  });
  return allowed;
}

function updateCuisineLock() {
  const allowed = getLockedCuisines();
  cuisines.forEach(c => {
    const btn = document.getElementById('cb-' + c.id);
    if (!btn) return;
    if (!allowed) {
      btn.classList.remove('locked');
    } else {
      if (allowed.has(c.id)) {
        btn.classList.remove('locked');
      } else {
        btn.classList.add('locked');
        // If active cuisine gets locked, switch to 'alle'
        if (activeCuisine === c.id) {
          setCuisine('alle');
        }
      }
    }
  });
}

function renderDishes() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const dishes = allDishes.filter(d => {
    const matchCuisine = activeCuisine === 'alle' || d.cuisine.includes(activeCuisine);
    const matchCourse  = d.course === activeCourse;
    const matchSearch  = !search ||
      d.name.toLowerCase().includes(search) ||
      d.desc.toLowerCase().includes(search);
    return matchCuisine && matchCourse && matchSearch;
  });

  const courseObj  = courses.find(c => c.id === activeCourse);
  const cuisineObj = cuisines.find(c => c.id === activeCuisine);
  const courseLabel  = courseObj  ? courseObj.label  : '';
  const cuisineLabel = cuisineObj ? cuisineObj.label : '';

  const content = document.getElementById('mainContent');
  if (dishes.length === 0) {
    content.innerHTML = `<div style="text-align:center;padding:50px 20px;color:#ccc">
      <div style="font-size:52px">🍽️</div>
      <p style="margin-top:14px;font-size:15px;font-weight:700">Keine Gerichte gefunden</p>
    </div>`;
    return;
  }

  content.innerHTML = `
    <div class="dish-section">
      <h4>${courseLabel} &middot; ${cuisineLabel === 'Alle' ? 'Alle Küchen' : cuisineLabel}</h4>
      ${dishes.map(d => `
        <div class="dish-card">
          <div class="dish-emoji">${d.emoji}</div>
          <div class="dish-info">
            <div class="dish-name">${escapeHtml(d.name)}</div>
            ${d.desc ? `<div class="dish-desc">${escapeHtml(d.desc)}</div>` : ''}
            <div class="dish-price">${d.price === 0 ? 'Gratis' : formatPrice(d.price) + '\u00a0€'}</div>
          </div>
          <button class="add-dish-btn" onclick="addToCart('${safeName(d.name)}', ${d.price}, '${d.emoji}')">+</button>
        </div>
      `).join('')}
    </div>
  `;
}

function escapeHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatPrice(p) {
  return p.toFixed(2).replace('.', ',');
}

function applyFilters() {
  renderDishes();
}

function addToCart(encodedName, price, emoji) {
  const name = decodeURIComponent(encodedName);
  const ex = cart.find(i => i.name === name);
  if (ex) {
    ex.qty++;
  } else {
    cart.push({ name, price, emoji, qty: 1 });
  }
  updateCartCount();
  updateCuisineLock();
  showToast('✅ ' + name + ' hinzugefügt');
}

function updateCartCount() {
  document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);
}

function openCart() {
  renderCart();
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('cartSheet').style.display = 'block';
}

function closeCart() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('cartSheet').style.display = 'none';
}

function renderCart() {
  const el = document.getElementById('cartItems');
  const ft = document.getElementById('cartFoot');

  if (cart.length === 0) {
    el.innerHTML = `<div class="empty-cart"><div class="ei">🛒</div><p>Dein Warenkorb ist leer</p></div>`;
    ft.innerHTML = '';
    return;
  }

  el.innerHTML = cart.map((item, i) => `
    <div class="ci">
      <span style="font-size:26px">${item.emoji}</span>
      <div class="ci-name">${escapeHtml(item.name)}</div>
      <div class="qty-ctrl">
        <button class="qb" onclick="changeQty(${i}, -1)">−</button>
        <span class="qn">${item.qty}</span>
        <button class="qb" onclick="changeQty(${i}, 1)">+</button>
      </div>
      <div class="ci-price">${formatPrice(item.price * item.qty)}&nbsp;€</div>
    </div>
  `).join('');

  const sub = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const del = sub >= 15 ? 0 : 1.99;
  const tot = sub + del;

  ft.innerHTML = `
    <div class="tr"><span>Zwischensumme</span><span>${formatPrice(sub)}&nbsp;€</span></div>
    <div class="tr"><span>Liefergebühr</span><span>${del === 0 ? 'Gratis' : formatPrice(del) + '&nbsp;€'}</span></div>
    <div class="tr fin"><span>Gesamt</span><span>${formatPrice(tot)}&nbsp;€</span></div>
    <button class="order-btn" onclick="placeOrder()">🛵 Jetzt bestellen – ${formatPrice(tot)}&nbsp;€</button>
  `;
}

function changeQty(i, delta) {
  cart[i].qty += delta;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  updateCartCount();
  updateCuisineLock();
  renderCart();
}

function placeOrder() {
  cart = [];
  updateCartCount();
  updateCuisineLock();
  closeCart();
  showToast('🎉 Bestellung aufgegeben! Guten Appetit!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
buildCuisineRow();
buildCourseRow();
renderDishes();
</script>
</body>
</html>
