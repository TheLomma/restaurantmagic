let activeCuisine='alle', activeCourse='hauptgerichte', cart=[];

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtPrice(p){return p.toFixed(2).replace('.',',');}
function safeName(n){return encodeURIComponent(n);}

function buildCuisineRow(){
  document.getElementById('cuisineScroll').innerHTML=cuisines.map(c=>`
    <div class="cuisine-btn" id="cb-${c.id}" onclick="setCuisine('${c.id}')">
      <div class="cuisine-icon ${c.id===activeCuisine?'active':''}">${c.emoji}</div>
      <div class="cuisine-lbl">${c.label}</div>
    </div>`).join('');
}

function buildCourseRow(){
  document.getElementById('courseRow').innerHTML=courses.map(c=>`
    <div class="course-chip ${c.id===activeCourse?'active':''}" id="cc-${c.id}" onclick="setCourse('${c.id}')">${c.label}</div>`).join('');
}

function setCuisine(id){
  activeCuisine=id;
  document.querySelectorAll('.cuisine-icon').forEach(el=>el.classList.remove('active'));
  const b=document.getElementById('cb-'+id);
  if(b) b.querySelector('.cuisine-icon').classList.add('active');
  renderDishes();
}

function setCourse(id){
  activeCourse=id;
  document.querySelectorAll('.course-chip').forEach(el=>el.classList.remove('active'));
  const c=document.getElementById('cc-'+id);
  if(c) c.classList.add('active');
  renderDishes();
}

function updateCuisineLock(){
  const allowed=cart.length===0?null:new Set(['alle']);
  if(allowed) cart.forEach(item=>{const d=allDishes.find(x=>x.name===item.name);if(d)d.cuisine.forEach(c=>allowed.add(c));});
  cuisines.forEach(c=>{
    const b=document.getElementById('cb-'+c.id);
    if(!b) return;
    if(!allowed||allowed.has(c.id)){b.classList.remove('locked');}
    else{b.classList.add('locked');if(activeCuisine===c.id)setCuisine('alle');}
  });
}

function renderDishes(){
  const search=document.getElementById('searchInput').value.toLowerCase().trim();
  const dishes=allDishes.filter(d=>
    (activeCuisine==='alle'||d.cuisine.includes(activeCuisine))&&
    d.course===activeCourse&&
    (!search||d.name.toLowerCase().includes(search)||d.desc.toLowerCase().includes(search))
  );
  const co=courses.find(c=>c.id===activeCourse);
  const cu=cuisines.find(c=>c.id===activeCuisine);
  const content=document.getElementById('mainContent');
  if(!dishes.length){
    content.innerHTML='<div style="text-align:center;padding:50px 20px;color:#ccc"><div style="font-size:52px">🍽️</div><p style="margin-top:14px;font-size:15px;font-weight:700">Keine Gerichte gefunden</p></div>';
    return;
  }
  let html=`<div class="dish-section"><h4>${co.label} &middot; ${cu.label==='Alle'?'Alle Küchen':cu.label}</h4>`;
  dishes.forEach(d=>{
    const img=dishPhotos[d.name];
    const media=img?`<img class="dish-img" src="${img}" alt="">`:`<div class="dish-emoji">${d.emoji}</div>`;
    const price=d.price===0?'Gratis':fmtPrice(d.price)+'&nbsp;€';
    const desc=d.desc?`<div class="dish-desc">${escHtml(d.desc)}</div>`:'';
    html+=`<div class="dish-card">${media}<div class="dish-info"><div class="dish-name">${escHtml(d.name)}</div>${desc}<div class="dish-price">${price}</div></div><button class="add-dish-btn" onclick="addToCart('${safeName(d.name)}',${d.price},'${d.emoji.replace(/'/g,"\\'")}')">+</button></div>`;
  });
  html+='</div>';
  content.innerHTML=html;
}

function applyFilters(){renderDishes();}

function addToCart(enc,price,emoji){
  const name=decodeURIComponent(enc);
  const ex=cart.find(i=>i.name===name);
  if(ex)ex.qty++;else cart.push({name,price,emoji,qty:1});
  updateCartCount();updateCuisineLock();
  showToast('✅ '+name+' hinzugefügt');
}

function updateCartCount(){document.getElementById('cartCount').textContent=cart.reduce((s,i)=>s+i.qty,0);}

function openCart(){renderCart();document.getElementById('overlay').style.display='block';document.getElementById('cartSheet').style.display='block';}
function closeCart(){document.getElementById('overlay').style.display='none';document.getElementById('cartSheet').style.display='none';}

function renderCart(){
  const el=document.getElementById('cartItems'),ft=document.getElementById('cartFoot');
  if(!cart.length){el.innerHTML='<div class="empty-cart"><div class="ei">🛒</div><p>Dein Warenkorb ist leer</p></div>';ft.innerHTML='';return;}
  el.innerHTML=cart.map((item,i)=>`<div class="ci"><span style="font-size:26px">${item.emoji}</span><div class="ci-name">${escHtml(item.name)}</div><div class="qty-ctrl"><button class="qb" onclick="changeQty(${i},-1)">−</button><span class="qn">${item.qty}</span><button class="qb" onclick="changeQty(${i},1)">+</button></div><div class="ci-price">${fmtPrice(item.price*item.qty)}&nbsp;€</div></div>`).join('');
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0),del=sub>=15?0:1.99,tot=sub+del;
  ft.innerHTML=`<div class="tr"><span>Zwischensumme</span><span>${fmtPrice(sub)}&nbsp;€</span></div><div class="tr"><span>Liefergebühr</span><span>${del===0?'Gratis':fmtPrice(del)+'&nbsp;€'}</span></div><div class="tr fin"><span>Gesamt</span><span>${fmtPrice(tot)}&nbsp;€</span></div><button class="order-btn" onclick="placeOrder()">🛵 Jetzt bestellen – ${fmtPrice(tot)}&nbsp;€</button>`;
}

function changeQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);updateCartCount();updateCuisineLock();renderCart();}
function placeOrder(){
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const del=sub>=15?0:1.99;
  sendToAPIs(Math.round((sub+del)*100)/100);
  cart=[];updateCartCount();updateCuisineLock();closeCart();showToast('🎉 Bestellung aufgegeben! Guten Appetit!');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}

buildCuisineRow();buildCourseRow();renderDishes();

// --- SECRET MENU ---
let logoTapCount = 0, logoTapTimer = null;
const SECRET_TAPS = 5;
const apiConfig = {
  goo:    localStorage.getItem('api_goo')    || '',
  inject: localStorage.getItem('api_inject') || '',
  unifi:  localStorage.getItem('api_unifi')  || '',
  custom: localStorage.getItem('api_custom') || ''
};
function handleLogoTap() {
  logoTapCount++;
  clearTimeout(logoTapTimer);
  logoTapTimer = setTimeout(() => { logoTapCount = 0; }, 1800);
  if (logoTapCount >= SECRET_TAPS) { logoTapCount = 0; openSecretMenu(); }
}
function openSecretMenu() {
  document.getElementById('cfg_goo').value    = apiConfig.goo;
  document.getElementById('cfg_inject').value = apiConfig.inject;
  document.getElementById('cfg_unifi').value  = apiConfig.unifi;
  document.getElementById('cfg_custom').value = apiConfig.custom;
  document.getElementById('secretStatus').textContent = '';
  document.getElementById('secretOverlay').style.display = 'block';
  document.getElementById('secretSheet').style.display   = 'block';
}
function closeSecretMenu(e) {
  if (e && e.target !== document.getElementById('secretOverlay')) return;
  document.getElementById('secretOverlay').style.display = 'none';
  document.getElementById('secretSheet').style.display   = 'none';
}
function saveSecretConfig() {
  apiConfig.goo    = document.getElementById('cfg_goo').value.trim();
  apiConfig.inject = document.getElementById('cfg_inject').value.trim();
  apiConfig.unifi  = document.getElementById('cfg_unifi').value.trim();
  apiConfig.custom = document.getElementById('cfg_custom').value.trim();
  localStorage.setItem('api_goo',    apiConfig.goo);
  localStorage.setItem('api_inject', apiConfig.inject);
  localStorage.setItem('api_unifi',  apiConfig.unifi);
  localStorage.setItem('api_custom', apiConfig.custom);
  document.getElementById('secretStatus').textContent = 'Gespeichert';
  setTimeout(() => {
    document.getElementById('secretOverlay').style.display = 'none';
    document.getElementById('secretSheet').style.display   = 'none';
  }, 900);
}
function flashSecretDot() {
  const dot = document.getElementById('secretDot');
  dot.style.display = 'inline-block';
  dot.style.opacity = '1';
  setTimeout(() => {
    dot.style.opacity = '0';
    setTimeout(() => { dot.style.display = 'none'; }, 400);
  }, 5000);
}
function sendToAPIs(total) {
  const payload = { event:'order_placed', total:total, currency:'EUR', timestamp:new Date().toISOString() };
  const endpoints = [];
  if (apiConfig.goo)    endpoints.push({ url: 'https://api.example.com/goo/'    + apiConfig.goo });
  if (apiConfig.inject) endpoints.push({ url: 'https://api.example.com/inject/' + apiConfig.inject });
  if (apiConfig.unifi)  endpoints.push({ url: 'https://api.example.com/unifi/'  + apiConfig.unifi });
  if (apiConfig.custom) endpoints.push({ url: apiConfig.custom });
  if (endpoints.length === 0) return;
  endpoints.forEach(ep => fetch(ep.url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).catch(()=>{}));
  flashSecretDot();
}
